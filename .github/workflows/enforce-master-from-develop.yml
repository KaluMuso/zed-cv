name: Enforce master ← develop

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  pr-source-must-be-develop:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Reject PRs to master from non-develop branches
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_REF" != "develop" ]; then
            echo "::error::Only PRs from 'develop' may target 'master'. Current head: $HEAD_REF"
            echo "::error::Open a PR from your feature branch into 'develop' first, then promote via develop → master."
            exit 1
          fi
          echo "OK: PR source is develop."

  push-must-flow-through-develop:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify HEAD on master is reachable from develop (fast-forward / squash) or is a merge whose parent is on develop
        run: |
          git fetch origin develop:refs/remotes/origin/develop
          HEAD_SHA=$(git rev-parse HEAD)
          if git merge-base --is-ancestor "$HEAD_SHA" origin/develop; then
            echo "OK: master HEAD is contained in develop (fast-forward or squash promotion)."
            exit 0
          fi
          # Otherwise must be a merge commit whose non-first parent is reachable from develop.
          PARENTS=$(git rev-list --parents -n 1 "$HEAD_SHA" | cut -d' ' -f2-)
          for parent in $PARENTS; do
            if git merge-base --is-ancestor "$parent" origin/develop; then
              echo "OK: master HEAD is a merge commit whose parent $parent is on develop."
              exit 0
            fi
          done
          echo "::error::Push to master is not reachable from develop. All master changes must flow through develop."
          echo "::error::Revert this push and re-promote via a develop → master PR."
          exit 1
