name: Frontend tests
on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend_tests.yml"
  push:
    branches: [master]
    paths:
      - "apps/frontend/**"

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm test
