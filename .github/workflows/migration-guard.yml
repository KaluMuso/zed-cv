name: Migration guard

on:
  pull_request:
    paths:
      - 'infra/supabase/migrations/**'

jobs:
  prefix-collision-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for duplicate migration prefixes
        run: |
          git fetch origin master --depth=1 || git fetch origin master
          touched_files=$(git diff --name-only origin/master...HEAD -- 'infra/supabase/migrations/*.sql')
          if [ -z "$touched_files" ]; then
            echo "::notice::No migration files modified in this PR."
            exit 0
          fi
          collision_found=0
          touched_prefixes=""
          for f in $touched_files; do
            if [ -f "$f" ]; then
              prefix=$(basename "$f" | sed 's|^\([0-9]*\)_.*|\1|')
              touched_prefixes="$touched_prefixes $prefix"
            fi
          done
          touched_prefixes=$(echo "$touched_prefixes" | tr ' ' '\n' | grep -v '^$' | sort -u)
          for prefix in $touched_prefixes; do
            match_count=$(ls infra/supabase/migrations/${prefix}_*.sql 2>/dev/null | wc -l)
            if [ "$match_count" -gt 1 ]; then
              echo "::error::Prefix collision detected for prefix: $prefix"
              ls -l infra/supabase/migrations/${prefix}_*.sql
              collision_found=1
            fi
          done
          if [ "$collision_found" -ne 0 ]; then
            echo "Rename one of the conflicting files to next available number"
            exit 1
          fi
          echo "::notice::No prefix collisions detected"

  dry-run-against-staging:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Dry-run migrations against staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: jorakuofeublgrjceuor
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::STAGING_SUPABASE_ACCESS_TOKEN not set — skipping dry-run"
            exit 0
          fi
          supabase link --project-ref $STAGING_PROJECT_REF || {
            echo "::warning::Supabase link failed (likely due to invalid credentials or lack of project privileges) — skipping dry-run"
            exit 0
          }
          supabase db push --dry-run || {
            echo "::error::Migrations failed dry-run on staging"
            exit 1
          }

