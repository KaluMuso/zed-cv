name: Migration guard

on:
  pull_request:
    paths:
      - 'infra/supabase/migrations/**'

jobs:
  prefix-collision-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for duplicate migration prefixes
        run: |
          dups=$(ls infra/supabase/migrations/*.sql 2>/dev/null \
            | sed 's|.*/\([0-9]*\)_.*|\1|' \
            | sort | uniq -d \
            | grep -v -E '^(063|074)$' || true)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration prefixes found: $dups"
            echo "Rename one of the conflicting files to next available number"
            exit 1
          fi
          echo "::notice::No prefix collisions detected"

  dry-run-against-staging:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Dry-run migrations against staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: jorakuofeublgrjceuor
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::STAGING_SUPABASE_ACCESS_TOKEN not set — skipping dry-run"
            exit 0
          fi
          supabase link --project-ref $STAGING_PROJECT_REF || {
            echo "::warning::Supabase link failed (likely due to invalid credentials or lack of project privileges) — skipping dry-run"
            exit 0
          }
          supabase db push --dry-run || {
            echo "::error::Migrations failed dry-run on staging"
            exit 1
          }

