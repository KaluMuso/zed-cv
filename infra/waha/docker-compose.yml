# Compose-level variable substitutions (${WAHA_API_KEY}, ${SUPABASE_*},
# ${N8N_*}) are read from `.env` in THIS directory, not from
# apps/backend/.env. The backend's env_file directive injects vars INTO
# the backend container; it does not feed compose-level substitution.
# Copy .env.example to .env and fill in values before `docker-compose up`.
version: '3.8'
services:
  waha:
    image: devlikeapro/waha:latest
    container_name: zedcv-waha
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_HOOK_URL: http://backend:8000/api/v1/webhooks/whatsapp
      WHATSAPP_HOOK_EVENTS: "message,message.ack,session.status"
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WHATSAPP_RESTART_ALL_SESSIONS: "true"
    volumes: [waha_data:/app/.waha]
    networks: [zedcv]

  backend:
    build: ../../apps/backend
    container_name: zedcv-backend
    restart: unless-stopped
    ports: ["8000:8000"]
    env_file: ../../apps/backend/.env
    environment:
      WAHA_API_URL: http://waha:3000
    networks: [zedcv]

  n8n:
    image: n8nio/n8n:latest
    container_name: zedcv-n8n
    restart: unless-stopped
    ports: ["5678:5678"]
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_BLOCK_ENV_ACCESS_IN_EXPRESSIONS: "false"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      FASTAPI_URL: http://backend:8000
      INGEST_API_KEY: ${INGEST_API_KEY}
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: google/gemini-2.0-flash-001
      ADMIN_ALERT_PHONE: "+260761359005"
    volumes: [n8n_data:/home/node/.n8n]
    networks: [zedcv]

volumes:
  waha_data:
  n8n_data:

networks:
  zedcv:
    driver: bridge
