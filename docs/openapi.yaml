    PaymentInitiateResponse:
      type: object
      properties:
        message: { type: string }
        transaction_id: { type: string }

    PaymentVerifyRequest:
      type: object
      required: [reference, tier]
      properties:
        reference:
          type: string
          description: Lenco widget reference (e.g. zedapply-uuid)
        tier:
          type: string
          enum: [starter, professional, super_standard]

    PaymentVerifyResponse:
      type: object
      properties:
        status: { type: string, enum: [completed, processing, failed] }
        tier: { type: string }
        reference: { type: string }
        payment_id: { type: string, format: uuid, nullable: true }
        message: { type: string }

    CoverLetterRequest:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string, format: uuid }
        tone: { type: string, enum: [formal, friendly, confident], default: formal }

    CoverLetterResponse:
      type: object
      properties:
        content: { type: string }
        word_count: { type: integer }

    JobCoverLetterResponse:
      type: object
      required: [content, word_count, document_id]
      properties:
        content: { type: string, description: Generated cover letter text }
        word_count: { type: integer, minimum: 1 }
        document_id: { type: string, format: uuid, description: Saved generated_documents row id }

    HealthCheck:
      type: object
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        version: { type: string }
        supabase: { type: boolean }
        waha: { type: boolean }

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthCheck' }

  /contact:
    post:
      operationId: submitContact
      summary: Relay contact-form message to operator inbox
      tags: [Contact]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactSubmission' }
      responses:
        '200':
          description: Message relayed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactResult' }
        '422': { description: Validation error }
        '429': { description: Rate limited (2 submissions per hour per IP) }
        '503': { description: Email relay unavailable }

  /auth/login:
    post:
      operationId: loginWithTrustedDevice
      summary: Login with trusted device (skip OTP when X-Device-Token is valid)
      tags: [Auth]
      parameters:
        - name: X-Device-Token
          in: header
          required: false
          schema: { type: string }
          description: Raw device trust token from localStorage (zedapply_device_token)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Trusted device accepted; JWT issued without OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { description: OTP required (unknown user or untrusted device) }

  /auth/otp/request:
    post:
      operationId: requestOTP
      summary: Request OTP via email or WhatsApp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OTPRequest' }
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OTPRequestResponse' }
        '429': { description: Rate limited }
        '503':
          description: Delivery channel unavailable (RFC 7807 problem+json)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /auth/otp/verify:
    post:
      operationId: verifyOTP
      summary: Verify OTP and get tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OTPVerify' }
      responses:
        '200':
          description: Auth successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { description: Invalid OTP }

  /profile:
    get:
      operationId: getProfile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    patch:
      operationId: updateProfile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProfileUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    delete:
      operationId: deleteProfile
      summary: Hard-delete the caller's account and cascade-related rows
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDeleted' }

  /profile/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
    patch:
      operationId: updateNotificationPreferences
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationPreferencesUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }

  /users/me/preferences:
    get:
      operationId: getUserPreferences
      summary: Dashboard settings (WhatsApp delivery, location, currency, alert cadence).
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPreferences' }
        '404': { description: User not found }
    patch:
      operationId: updateUserPreferences
      summary: Partially update dashboard settings. Changing whatsapp_number clears whatsapp_verified.
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserPreferencesUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPreferences' }
        '422': { description: Validation failed or empty body }

  /users/me/preferences/auto-match:
    get:
      operationId: getAutoMatchPreferences
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoMatchPreferences' }
    patch:
      operationId: updateAutoMatchPreferences
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutoMatchPreferencesUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoMatchPreferences' }

  /users/me/saved-jobs:
    get:
      operationId: listSavedJobs
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SavedJobsList' }

  /preferences:
    get:
      operationId: getJobPreferences
      summary: Get the user's job-search preferences (auto-creates an empty row on first read).
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobPreferences' }
    patch:
      operationId: updateJobPreferences
      summary: Partially update the user's job-search preferences.
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobPreferencesUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobPreferences' }
        '422': { description: Validation failed (e.g. salary_min > salary_max) }

  /profile/skills:
    get:
      operationId: listSkills
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }
    post:
      operationId: addSkill
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSkillCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }

  /profile/skills/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    patch:
      operationId: updateSkill
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSkillUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }
        '404': { description: Skill not on profile }
    delete:
      operationId: removeSkill
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }
        '404': { description: Skill not found }

  /admin/email/health:
    get:
      operationId: adminEmailHealth
      summary: Resend connectivity check (no email sent)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Health report (status ok, degraded, or error)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminEmailHealth' }
        '403': { description: Admin only }

  /admin/stats:
    get:
      operationId: adminStats
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminStats' }
        '403': { description: Superadmin only }

  /admin/llm-cost-stats:
    get:
      operationId: adminLlmCostStats
      tags: [Admin]
      summary: Rolling LLM inference cost by model and feature
      security: [{ bearerAuth: [] }]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 7, minimum: 1, maximum: 90 }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminLlmCostStats' }
        '403': { description: Admin only }

  /admin/scraper-stats:
    get:
      operationId: adminScraperStats
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: |
        Daily WhatsApp classifier outcomes from ai_cache.metadata
        (classifier_decision: accepted_as_job | rejected_as_promo | rejected_as_other),
        plus deep-link parser telemetry (parser → attempted / found_email /
        found_phone / failed) from ai_cache cache_type deep_link_parser.
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 7, minimum: 1, maximum: 90 }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminScraperStats' }
        '403': { description: Admin only }

  /admin/export/companies.csv:
    get:
      operationId: adminExportCompaniesCsv
      tags: [Admin]
      summary: Export companies CSV (job counts and contact info)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: CSV attachment
          content:
            text/csv:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="companies.csv"'
        '403': { description: Admin only }

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: search, in: query, schema: { type: string } }
        - { name: tier, in: query, schema: { type: string, enum: [free, starter, professional, super_standard] } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUserList' }
        '403': { description: Superadmin only }

  /admin/users/{user_id}/welcome-bonus:
    patch:
      operationId: adminUpdateUserWelcomeBonus
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: Superadmin override for a user's welcome match bonus quota and end date.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminWelcomeBonusUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUserRow' }
        '403': { description: Superadmin only }
        '404': { description: User not found }
        '422': { description: No fields to update }

  /admin/jobs:
    get:
      operationId: adminListJobs
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: expired, in: query, schema: { type: boolean } }
        - { name: is_active, in: query, schema: { type: boolean } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminJobList' }
        '403': { description: Superadmin only }
    post:
      operationId: adminCreateJob
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: |
        Create a manually-entered job. The handler routes the payload through
        the same embedding + fingerprint + Wave-2-skill-resolver pipeline the
        scraper uses, so manual entries are first-class in the matching engine.
        `updated_by_user_id` is set to the calling admin (migration 027).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminJobCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '400': { description: Validation error (unknown field, salary inversion, missing apply_url/apply_email) }
        '401': { description: Missing or invalid token }
        '403': { description: Not an admin }
        '409': { description: Duplicate fingerprint (job already exists) }
        '503': { description: Embedding service unavailable }

  /admin/review-jobs:
    get:
      operationId: adminTrack4eReviewQueue
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: Jobs with is_review_required=true (Track 4e), newest first.
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminJobReviewQueue' }
        '403': { description: Not an admin }

  /admin/review-jobs/{job_id}:
    patch:
      operationId: adminTrack4eUpdateReviewJob
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminJobReviewUpdate' }
      responses:
        '200': { description: Job updated; may promote to active }
        '403': { description: Not an admin }
        '404': { description: Job not found }

  /admin/review-jobs/bulk-mark-duplicate:
    post:
      operationId: adminTrack4eBulkMarkDuplicate
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewJobsBulkRequest' }
      responses:
        '200': { description: Jobs marked duplicate }

  /admin/review-jobs/bulk-permanently-inactive:
    post:
      operationId: adminTrack4eBulkPermanentlyInactive
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewJobsBulkRequest' }
      responses:
        '200': { description: Jobs permanently hidden }

  /admin/jobs/review-queue:
    get:
      operationId: adminJobsReviewQueue
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminJobReviewQueue' }
        '403': { description: Not an admin }

  /admin/jobs/{job_id}/approve:
    post:
      operationId: adminApproveReviewJob
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminJobReviewUpdate' }
      responses:
        '200': { description: Job approved }
        '403': { description: Not an admin }
        '404': { description: Job not found }

  /admin/jobs/{job_id}/dismiss:
    post:
      operationId: adminDismissReviewJob
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Job dismissed }
        '403': { description: Not an admin }
        '404': { description: Job not found }

  /admin/jobs/{job_id}:
    patch:
      operationId: adminUpdateJob
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: |
        Partial update. Only fields in the request body are written
        (computed via `model_dump(exclude_unset=True)` — field absent vs
        explicit empty list are distinct).

        Embedding regenerates when title/description/requirements/tools_tech_stack
        change. Fingerprint regenerates when title/company/description
        change — if the new fingerprint collides with another ACTIVE
        job, the update is still allowed (warn-only) and an
        `admin_job_fingerprint_collision` analytics event is emitted.

        job_skills rebuilds wholesale when EITHER `requirements` or
        `skills_required` is explicitly sent — including an empty list,
        which clears every job_skills row. Omitting both fields leaves
        existing job_skills untouched. When both are sent,
        `skills_required` (the more specific field) takes precedence.

        `updated_by_user_id` and `updated_at` are always written.
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminJobUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '400': { description: Validation error }
        '401': { description: Missing or invalid token }
        '403': { description: Not an admin }
        '404': { description: Job not found }
        '422': { description: Empty PATCH body }
        '503': { description: Embedding service unavailable }
    delete:
      operationId: adminDeactivateJob
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: |
        Soft-delete a job. Sets `is_active = false` and records
        `updated_by_user_id`. Hard-delete is intentionally not supported —
        match history and analytics events reference the row. To
        re-activate a soft-deleted job, PATCH `is_active = true`.
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '401': { description: Missing or invalid token }
        '403': { description: Not an admin }
        '404': { description: Job not found }
        '409': { description: Already inactive }

  /admin/jobs/bulk-deactivate:
    post:
      operationId: adminBulkDeactivateJobs
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkDeactivateRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkDeactivateResponse' }
        '403': { description: Superadmin only }

  /admin/matches:
    get:
      operationId: adminListMatches
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: min_score, in: query, schema: { type: number, minimum: 0, maximum: 100 } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminMatchList' }
        '403': { description: Superadmin only }

  /admin/subscriptions:
    get:
      operationId: adminListSubscriptions
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: tier, in: query, schema: { type: string, enum: [free, starter, professional, super_standard] } }
        - { name: status, in: query, schema: { type: string, enum: [active, expired, cancelled, past_due] } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSubscriptionList' }
        '403': { description: Superadmin only }

  /admin/subscriptions/{user_id}:
    parameters:
      - { in: path, name: user_id, required: true, schema: { type: string, format: uuid } }
    patch:
      operationId: adminUpdateSubscription
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminSubscriptionUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSubscriptionRow' }
        '403': { description: Superadmin only }
        '404': { description: Subscription not found }

  /tiers:
    get:
      operationId: listPublicTiers
      tags: [Pricing]
      summary: Public tier pricing and match quotas
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TierConfigList' }

  /admin/tiers:
    get:
      operationId: adminListTiers
      tags: [Admin]
      security: [{ bearerAuth: [] }, { adminApiKey: [] }]
      summary: List tier pricing and match quotas (superadmin JWT or admin API key)
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TierConfigList' }
        '401': { description: Missing or invalid credentials }
        '403': { description: Superadmin only (JWT path) }

  /admin/tiers/{tier_name}:
    patch:
      operationId: adminPatchTier
      tags: [Admin]
      security: [{ bearerAuth: [] }, { adminApiKey: [] }]
      summary: Update price and match quota for one tier
      parameters:
        - name: tier_name
          in: path
          required: true
          schema:
            type: string
            enum: [free, starter, professional, super_standard]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TierConfigPatch' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TierConfigRow' }
        '401': { description: Missing or invalid credentials }
        '403': { description: Superadmin only (JWT path) }
        '404': { description: Unknown tier }
        '422': { description: Validation error }

  /admin/tier-config:
    get:
      operationId: adminGetTierConfig
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Read tier pricing and match quotas (superadmin, legacy path)
      deprecated: true
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TierConfigList' }
        '403': { description: Superadmin only }
    put:
      operationId: adminUpdateTierConfig
      tags: [Admin]
