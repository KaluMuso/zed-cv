    post:
      operationId: trackAnalyticsEvent
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event: { type: string, maxLength: 64, example: apply_click }
                properties:
                  type: object
                  additionalProperties: true
                  example:
                    job_id: "00000000-0000-0000-0000-000000000001"
                    apply_source: source_fallback
      responses:
        '204': { description: Event recorded (best-effort) }

  /matches:
    get:
      operationId: getMatches
      summary: Delivered matches this month (canonical product feed + quota)
      description: >
        Returns credited deliveries for the current Africa/Lusaka calendar month.
        Quota fields (`matches_used`, `remaining_quota`, etc.) use `matches.credited_at`
        — see docs/MATCH_QUOTA.md. Prefer this over GET /matches/{user_id}.
      tags: [Matching]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: min_score, in: query, schema: { type: number, default: 50 } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
        - name: include_closed
          in: query
          schema: { type: boolean, default: false }
          description: Deprecated alias for include_archived.
        - name: include_archived
          in: query
          schema: { type: boolean, default: false }
          description: When true, include matches for archived jobs.
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchList' }

  /matches/{match_id}/dismiss:
    post:
      operationId: dismissMatch
      summary: Hide a match from the user's feed (soft delete)
      tags: [Matching]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: match_id
          in: path
          required: true
