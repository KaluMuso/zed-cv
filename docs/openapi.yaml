        welcome_match_bonus:
          type: integer
          nullable: true
          description: Free-tier welcome quota while welcome_match_bonus_until is active.
        welcome_match_bonus_until:
          type: string
          format: date-time
          nullable: true
        promo_until:
          type: string
          format: date-time
          nullable: true
