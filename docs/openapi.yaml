  /jobs:
    get:
      operationId: listJobs
      tags: [Jobs]
      security: []
      description: |
        Public job discovery feed. Optional Bearer token enables `saved_only`.
        Expired listings are hidden using the same 3-day grace window as the
        frontend (`isJobHiddenFromUserFeed`): jobs with `closing_date` more than
        three calendar days in the past are excluded unless `include_closed=true`.
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
        - { name: location, in: query, schema: { type: string }, description: Case-insensitive substring match on jobs.location }
        - { name: search, in: query, schema: { type: string }, description: Case-insensitive substring match across title, company, description }
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, recent, closing]
            default: recent
        - name: skills
          in: query
          schema: { type: string }
          description: Comma-separated skill names. OR semantics; resolves canonical names and skill_aliases.
        - name: source
          in: query
          schema: { type: string }
          description: Comma-separated source values (manual, scraper, ocr, partner). OR semantics.
        - name: employment_type
          in: query
          schema: { type: string }
          description: Comma-separated employment types. OR semantics (full_time, part_time, contract, freelance, internship, temporary).
        - name: work_arrangement
          in: query
          schema: { type: string }
          description: Comma-separated work arrangements. OR semantics (remote, hybrid, on_site).
        - name: has_salary
          in: query
          schema: { type: boolean, default: false }
          description: When true, only jobs with salary_min and/or salary_max set.
        - name: saved_only
          in: query
          schema: { type: boolean, default: false }
          description: When true, restrict to jobs saved by the authenticated user. Requires Bearer token.
        - name: include_closed
          in: query
          schema: { type: boolean, default: false }
          description: Deprecated alias for include_archived.
        - name: include_archived
          in: query
          schema: { type: boolean, default: false }
          description: When true, include archived jobs (hidden after 3-day post-close grace).
        - name: closed_only
          in: query
          schema: { type: boolean, default: false }
          description: When true, only recently closed and archived jobs (jobs page “Show closed” filter).
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobList' }
        '401':
          description: saved_only requested without a valid Bearer token (RFC 7807 detail code auth_required)
    post:
      operationId: createJob
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }

  /jobs/sitemap:
    get:
      operationId: listJobsForSitemap
      summary: Active job IDs for sitemap.xml generation
      tags: [Jobs]
      security: []
      description: |
        Public, auth-free export of up to 50,000 active job IDs with lastmod timestamps.
        Used by the Next.js `/sitemap.xml` route. Excludes review-required listings.
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobSitemapResponse' }

  /jobs/{job_id}:
    get:
      operationId: getJob
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }

  /jobs/{job_id}/enrich:
    patch:
      operationId: enrichJobListing
      tags: [Jobs]
      description: |
        Deep-scrape enrichment callback (n8n). Requires admin Bearer JWT or
        X-INGEST-API-KEY / INGEST_API_KEY header (same secret as bulk ingest).
      security:
        - bearerAuth: []
        - {}
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: X-INGEST-API-KEY, in: header, schema: { type: string } }
        - { name: INGEST_API_KEY, in: header, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobEnrichPatch' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '401': { description: Missing or invalid admin / ingest credentials }
        '403': { description: Authenticated user is not admin }
        '404': { description: Job not found }
        '422': { description: Validation error or empty patch }

  /jobs/deep-enrich-tick:
    post:
      operationId: deepEnrichTick
      tags: [Jobs]
      description: |
        Secondary scrape batch (n8n cron and post-ingest hook). Fetches HTTP
        source_url pages for jobs pending deep enrichment, discovers
        apply_url/apply_email/closing_date, splits multi-role listings, and
        clears admin review queue rows when contacts are found. Auth via
        INGEST_API_KEY / X-INGEST-API-KEY (same as bulk ingest). Optional
        `api_key` query param when proxies strip custom headers (n8n scraper).
      security: []
      parameters:
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
        - name: include_review_queue
          in: query
          schema: { type: boolean, default: true }
          description: |
            When true (default), also deep-enrich jobs with is_review_required=true
            even if is_active=false, so scraper ingest can resolve missing apply paths.
        - name: api_key
          in: query
          schema: { type: string }
          description: Ingest secret (same as POST /jobs/ingest body api_key).
        - { name: X-INGEST-API-KEY, in: header, schema: { type: string } }
        - { name: INGEST_API_KEY, in: header, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeepEnrichTickResponse' }
        '401': { description: Invalid ingest API key }

  /jobs/{job_id}/generate-cover-letter:
    post:
      operationId: generateJobCoverLetter
      summary: Generate tailored cover letter for a job
      description: |
        Uses the authenticated user's primary CV and the job description to
        produce a 200–250 word cover letter via OpenAI. Persists to
        generated_documents for dashboard history. Requires Professional
        tier or higher (superadmin bypass).
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobCoverLetterResponse' }
        '403': { description: Professional tier required }
        '404': { description: Job not found }
        '422': { description: No CV uploaded }
        '503': { description: OpenAI unavailable or rate limited }

