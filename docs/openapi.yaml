      type: object
      properties:
        users_processed: { type: integer }
        new_matches_total: { type: integer }

    NotificationDigestResponse:
      type: object
      properties:
        users_processed: { type: integer }
        notifications_sent: { type: integer }

    ReviewQueueAlertResponse:
