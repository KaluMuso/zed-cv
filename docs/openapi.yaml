        semantic_score:
          type: number
          minimum: 0
          maximum: 100
          description: >
            Match component points. For match_jobs_for_user (migration 060+) this is the
            pre-weighted semantic bucket (0–50). Legacy stored rows may use raw 0–100 similarity.
        skills_score:
          type: number
          minimum: 0
          maximum: 100
          description: Skills bucket 0–20 (RPC 060+) or raw overlap 0–100 (legacy).
        experience_score:
          type: number
          minimum: 0
          maximum: 100
          description: Experience bucket 0–15 (RPC 060+) or raw fit 0–100 (legacy).
        location_score:
          type: number
          minimum: 0
          maximum: 100
          description: Location bucket 0–10 (RPC 060+) or raw fit 0–100 (legacy).
        recency_score:
          type: number
          minimum: 0
          maximum: 100
          description: Recency bucket 0–5 (RPC 060+) or raw score 0–100 (legacy).
        weighted_semantic_contribution:
          type: number
          description: >
            Presentation alias for semantic contribution. Equals semantic_score for RPC 060
            buckets; legacy raw rows use semantic_score × 0.5.
        weighted_skills_contribution:
          type: number
          description: Equals skills_score for RPC 060 buckets; legacy uses skills_score × 0.2.
        weighted_experience_contribution:
          type: number
          description: Equals experience_score for RPC 060 buckets; legacy uses experience_score × 0.15.
        weighted_location_contribution:
          type: number
          description: Equals location_score for RPC 060 buckets; legacy uses location_score × 0.1.
        weighted_recency_contribution:
          type: number
          description: Equals recency_score for RPC 060 buckets; legacy uses recency_score × 0.05.
        vector_score:
          type: number
          minimum: 0
          description: Legacy alias of semantic_score
        skill_score:
          type: number
          minimum: 0
          description: Legacy alias of skills_score
        bonus_score:
          type: number
          minimum: 0
          description: Legacy alias of location_score + recency_score
        matched_skills: { type: array, items: { type: string } }
