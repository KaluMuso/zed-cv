        tier: { type: string, enum: [free, starter, professional, super_standard] }

    Job:
      type: object
      description: |
        Canonical job response shape. Mirrors apps/backend/app/schemas/jobs.py::Job.
        All task-#60 fields are optional + nullable so legacy rows (pre-migration 016)
        still satisfy the schema.
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        company: { type: string }
        location: { type: string }
        description: { type: string }
        description_markdown:
          type: string
          nullable: true
          description: Markdown-normalized description for UI (Track 4e).
        requirements: { type: array, items: { type: string } }
        skills_required: { type: array, items: { type: string } }
        skills: { type: array, items: { type: string }, description: "Alias for frontend compatibility" }
        salary_min: { type: integer }
        salary_max: { type: integer }
        apply_url: { type: string, format: uri, nullable: true }
        apply_email: { type: string, format: email, nullable: true }
        apply_source:
          type: string
          enum: [direct, source_fallback, enriched, description_email, description_url]
          nullable: true
          description: How apply contact was resolved (Track 4d/4e).
        enrichment_attempted_at:
          type: string
          format: date-time
          nullable: true
          description: Last deep-link enrichment attempt timestamp.
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        source_url: { type: string, format: uri, nullable: true }
        quality_score: { type: integer, minimum: 0, maximum: 100 }
        closing_date: { type: string, format: date }
        posted_at: { type: string, format: date-time }
        is_active: { type: boolean }
        # task #60: richer job ad shape (migration 016). All nullable.
        employment_type:
          type: string
          enum: [full_time, part_time, contract, freelance, internship, temporary]
          nullable: true
        work_arrangement:
          type: string
          enum: [remote, hybrid, on_site]
          nullable: true
        hybrid_days_per_week: { type: integer, minimum: 1, maximum: 5, nullable: true }
        benefits: { type: array, items: { type: string }, nullable: true }
        application_instructions: { type: string, nullable: true }
        reporting_structure: { type: string, nullable: true }
        manages_others: { type: integer, minimum: 0, nullable: true }
        interview_process: { type: string, nullable: true }
        tools_tech_stack: { type: array, items: { type: string }, nullable: true }
        success_metrics: { type: string, nullable: true }
        company_description: { type: string, nullable: true }
        reference_number: { type: string, nullable: true }
        currency: { type: string, nullable: true }
        pay_frequency:
          type: string
          enum: [monthly, annual, hourly, daily]
          nullable: true
        bonus_structure: { type: string, nullable: true }
        equity_offered: { type: boolean, nullable: true }
        source_platform:
          type: string
          maxLength: 64
          nullable: true
          description: Listing site id (e.g. gozambiajobs, linkedin).
        original_source_url:
          type: string
          format: uri
          nullable: true
          description: Employer-direct URL after deep scrape.
        contact_email: { type: string, format: email, nullable: true }
        contact_phone:
          type: string
          nullable: true
          description: E.164 +260XXXXXXXXX when Zambian mobile.
        contact_whatsapp:
          type: string
          nullable: true
          description: WhatsApp apply contact (E.164 or wa.me link).
        is_enriched:
          type: boolean
          default: false
          description: True after deep-scrape enrichment was applied.
        admin_published:
          type: boolean
          nullable: true
          description: Admin force-publish without extracted apply contacts.
        scraping_sources:
          type: array
          description: Multi-aggregator provenance ({url, source_type, scraped_at}).
          items:
            type: object
            additionalProperties: false
            properties:
              url: { type: string, format: uri }
              source_type: { type: string }
              scraped_at: { type: string, format: date-time }

    JobEnrichPatch:
      type: object
      description: |
        PATCH /jobs/{job_id}/enrich payload (n8n deep scrape). extra=forbid on
        Python side. At least one enrichment field required. Sets is_enriched=true
        unless explicitly set false.
      additionalProperties: false
      properties:
        source_platform: { type: string, maxLength: 64 }
        original_source_url: { type: string, format: uri }
        contact_email: { type: string, format: email }
        contact_phone: { type: string, maxLength: 20 }
        contact_whatsapp: { type: string, maxLength: 64 }
        apply_url: { type: string, format: uri }
        apply_email: { type: string, format: email }
        is_enriched: { type: boolean, default: true }

    DeepEnrichTickResponse:
      type: object
      required: [processed, enriched, unchanged]
      properties:
        processed: { type: integer, minimum: 0 }
        enriched: { type: integer, minimum: 0 }
        unchanged: { type: integer, minimum: 0 }

    JobCreate:
      type: object
      required: [title, description, source]
      properties:
        title: { type: string, minLength: 5 }
        company: { type: string }
        location: { type: string }
        description: { type: string, minLength: 20 }
        requirements: { type: array, items: { type: string } }
        skills_required: { type: array, items: { type: string } }
        salary_min: { type: integer }
        salary_max: { type: integer }
        apply_url: { type: string, format: uri }
        apply_email: { type: string, format: email }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        closing_date: { type: string, format: date }
        source_platform: { type: string, maxLength: 64 }
        original_source_url: { type: string, format: uri }
        contact_email: { type: string, format: email }
        contact_phone: { type: string, maxLength: 20 }
        contact_whatsapp: { type: string, maxLength: 64 }
        is_enriched: { type: boolean }

    AdminJobCreate:
      type: object
      description: |
        POST /admin/jobs payload. extra='forbid' on the Python side: unknown
        fields 422 instead of being silently dropped. Exactly one of apply_url
        OR apply_email is required (XOR enforced server-side).

        `requirements` carries free-text qualification bullets (stored as-is on
        the jobs.requirements text[] column). `skills_required` carries skill
        names that flow through the Wave-2 resolver and populate job_skills —
        the two fields are NOT interchangeable.
      required: [title, description]
      additionalProperties: false
      properties:
        title: { type: string, minLength: 1, maxLength: 5000 }
        company: { type: string, maxLength: 500 }
        location: { type: string }
        description: { type: string, minLength: 1, maxLength: 5000 }
        requirements: { type: array, items: { type: string, minLength: 1, maxLength: 100 }, maxItems: 50 }
        skills_required: { type: array, items: { type: string, minLength: 1, maxLength: 100 }, maxItems: 50 }
        salary_min: { type: integer }
        salary_max: { type: integer }
        apply_url: { type: string, format: uri }
        apply_email: { type: string, format: email }
        source: { type: string, enum: [manual, scraper, ocr, partner], default: manual }
        source_url: { type: string, format: uri }
        closing_date: { type: string, format: date }
        posted_at: { type: string, format: date }
        employment_type: { type: string, enum: [full_time, part_time, contract, freelance, internship, temporary] }
        work_arrangement: { type: string, enum: [remote, hybrid, on_site] }
        hybrid_days_per_week: { type: integer, minimum: 1, maximum: 5 }
        benefits: { type: array, items: { type: string } }
        application_instructions: { type: string, maxLength: 2000 }
        reporting_structure: { type: string, maxLength: 500 }
        manages_others: { type: integer, minimum: 0, maximum: 10000 }
        interview_process: { type: string, maxLength: 1000 }
        tools_tech_stack: { type: array, items: { type: string } }
        success_metrics: { type: string, maxLength: 1000 }
        company_description: { type: string, maxLength: 2000 }
        reference_number: { type: string, maxLength: 100 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        pay_frequency: { type: string, enum: [monthly, annual, hourly, daily] }
        bonus_structure: { type: string, maxLength: 500 }
        equity_offered: { type: boolean }
        salary_text: { type: string, maxLength: 500, description: "Input-only; parsed into salary_min/max when those are null" }

    AdminJobUpdate:
      type: object
      description: |
        PATCH /admin/jobs/{job_id} payload. Every field optional; only fields
        explicitly set in the request body are written. `extra='forbid'` —
        unknown keys 422. Empty body 422.
      additionalProperties: false
      properties:
        title: { type: string, minLength: 1, maxLength: 5000 }
        company: { type: string, maxLength: 500 }
        location: { type: string }
        description: { type: string, minLength: 1, maxLength: 5000 }
        requirements: { type: array, items: { type: string, minLength: 1, maxLength: 100 }, maxItems: 50 }
        skills_required: { type: array, items: { type: string, minLength: 1, maxLength: 100 }, maxItems: 50 }
        salary_min: { type: integer }
        salary_max: { type: integer }
        apply_url: { type: string, format: uri }
        apply_email: { type: string, format: email }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        source_url: { type: string, format: uri }
        closing_date: { type: string, format: date }
        posted_at: { type: string, format: date }
        employment_type: { type: string, enum: [full_time, part_time, contract, freelance, internship, temporary] }
        work_arrangement: { type: string, enum: [remote, hybrid, on_site] }
        hybrid_days_per_week: { type: integer, minimum: 1, maximum: 5 }
        benefits: { type: array, items: { type: string } }
        application_instructions: { type: string, maxLength: 2000 }
        reporting_structure: { type: string, maxLength: 500 }
        manages_others: { type: integer, minimum: 0, maximum: 10000 }
        interview_process: { type: string, maxLength: 1000 }
        tools_tech_stack: { type: array, items: { type: string } }
        success_metrics: { type: string, maxLength: 1000 }
        company_description: { type: string, maxLength: 2000 }
        reference_number: { type: string, maxLength: 100 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        pay_frequency: { type: string, enum: [monthly, annual, hourly, daily] }
        bonus_structure: { type: string, maxLength: 500 }
        equity_offered: { type: boolean }
        salary_text: { type: string, maxLength: 500 }
        is_active: { type: boolean, description: "Re-activate a soft-deleted job by PATCHing true" }
        admin_published:
          type: boolean
          description: Force-publish on the public site without extracted contacts.
        source_platform: { type: string, maxLength: 64 }
        original_source_url: { type: string, format: uri }
        contact_email: { type: string, format: email }
        contact_phone: { type: string, maxLength: 20 }
        contact_whatsapp: { type: string, maxLength: 64 }
        is_enriched: { type: boolean }

    JobList:
      type: object
      properties:
        jobs: { type: array, items: { $ref: '#/components/schemas/Job' } }
