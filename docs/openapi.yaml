openapi: 3.1.0
info:
  title: Zed CV API
  description: AI-powered job matching platform for Zambia
  version: 0.1.0
  contact:
    email: convergeozambia@gmail.com
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.zedcv.com/api/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminApiKey:
      type: apiKey
      in: header
      name: X-ADMIN-API-KEY
      description: >
        Admin or ingest service key (ADMIN_API_KEY, X-ADMIN-API-KEY, INGEST_API_KEY,
        or X-INGEST-API-KEY). Alternative to superadmin Bearer JWT.

  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail:
          type: string
          description: Machine-readable error code (e.g. email_provider_unavailable) or human detail.
        user_message:
          type: string
          description: Safe user-facing message when detail is a machine code.
        instance: { type: string }
        request_id: { type: string }

    AdminEmailHealth:
      type: object
      required: [status, message, api_key_configured, from_email]
      properties:
        status: { type: string, enum: [ok, degraded, error] }
        code: { type: string, nullable: true }
        message: { type: string }
        api_key_configured: { type: boolean }
        from_email: { type: string }
        from_domain: { type: string, nullable: true }
        domain_verified: { type: boolean, nullable: true }
        domains_listed: { type: integer, nullable: true }

    PushSubscriptionKeys:
      type: object
      required: [p256dh, auth]
      properties:
        p256dh: { type: string }
        auth: { type: string }

    PushSubscribeRequest:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint: { type: string }
        keys: { $ref: '#/components/schemas/PushSubscriptionKeys' }
        expirationTime: { type: integer, nullable: true }

    PushSubscribeResponse:
      type: object
      required: [ok, message]
      properties:
        ok: { type: boolean }
        message: { type: string }

    PushTestRequest:
      type: object
      properties:
        user_id: { type: string, format: uuid, nullable: true }

    PushTestResponse:
      type: object
      required: [delivered, message]
      properties:
        delivered: { type: integer }
        message: { type: string }

    AdminNotificationCreate:
      type: object
      required: [title, body, target_audience]
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        body: { type: string, minLength: 1, maxLength: 500 }
        url: { type: string, maxLength: 512, nullable: true }
        target_audience:
          type: string
          enum: [all, tier]
        target_tier:
          $ref: '#/components/schemas/SubscriptionTier'
          nullable: true
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: Omit or set in the past to send immediately; future values queue for cron dispatch.

    AdminNotificationCreateResponse:
      type: object
      required: [campaign_id, status, target_audience, recipients_queued, message]
      properties:
        campaign_id: { type: string, format: uuid }
        status:
          type: string
          enum: [scheduled, sending, completed]
        target_audience:
          type: string
          enum: [all, tier]
        target_tier:
          $ref: '#/components/schemas/SubscriptionTier'
          nullable: true
        recipients_queued: { type: integer }
        scheduled_at: { type: string, format: date-time, nullable: true }
        message: { type: string }

    AdminNotificationDispatchResponse:
      type: object
      required: [campaigns_processed, recipients_sent, recipients_failed]
      properties:
        campaigns_processed: { type: integer }
        recipients_sent: { type: integer }
        recipients_failed: { type: integer }

    OTPRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$', example: "+260971234567" }
        channel:
          type: string
          enum: [email, whatsapp, both]
          description: Override OTP delivery channel for this request.

    OTPVerify:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        code: { type: string, minLength: 6, maxLength: 6 }
        email:
          type: string
          format: email
          description: Required when creating a new account; stored for match digests.
        consent_accepted:
          type: boolean
          description: Required true when creating a new account.
        remember_device:
          type: boolean
          default: false
          description: When true, returns device_token to store for trusted-device login.
        referral_ref:
          type: string
          maxLength: 64
          description: Invite ref from shared link (?ref=) — referrer user id or referral_code.

    LoginRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$', example: "+260971234567" }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    OTPRequestResponse:
      type: object
      properties:
        message: { type: string }
        tier: { type: string, nullable: true }
        default_channel: { type: string, enum: [email, whatsapp, both], nullable: true }

    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user_id: { type: string, format: uuid }
        device_token:
          type: string
          nullable: true
          description: Issued when remember_device was true on OTP verify.
        trusted_device_login:
          type: boolean
          default: false
          description: True when /auth/login skipped OTP via trusted device.

    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string }
        email: { type: string, format: email }
        location: { type: string }
        years_experience: { type: integer, minimum: 0 }
        skills: { type: array, items: { type: string } }
        cv_uploaded: { type: boolean }
        subscription_tier: { type: string, enum: [free, starter, professional, super_standard] }
        role: { type: string, enum: [user, superadmin] }
        created_at: { type: string, format: date-time }
        cv_sections:
          oneOf:
            - { $ref: '#/components/schemas/CVSections' }
            - { type: 'null' }
          description: |
            Structured CV body extracted by the parser (task #59). Null for
            users who haven't uploaded a CV or whose upload pre-dates the
            structured-parser change. Canon shape is app/schemas/cv_sections.py.
        referral_code:
          type: string
          description: Stable invite code for sharing with friends.
        referral_signups_count:
          type: integer
          minimum: 0
          description: Users who signed up via this user's invite link.
        referral_qualified_count:
          type: integer
          minimum: 0
          description: Referred users who completed their first paid subscription (referral reward granted).
        education:
          type: array
          items: { type: object, additionalProperties: true }
          description: Structured education entries from users.education (JSONB).
        certifications:
          type: array
          items: { type: object, additionalProperties: true }
          description: Professional certifications from users.certifications (JSONB).

    CVSections:
      type: object
      description: |
        Structured CV body. All sections optional; missing sections render
        as empty. Field-level shape lives in app/schemas/cv_sections.py;
        this schema documents the top-level keys only.
      properties:
        header:
          type: object
          nullable: true
          properties:
            linkedin_url: { type: string, format: uri, nullable: true }
            portfolio_url: { type: string, format: uri, nullable: true }
            github_url: { type: string, format: uri, nullable: true }
        professional_summary:
          type: object
          nullable: true
          properties:
            text: { type: string, maxLength: 1000 }
        work_experience: { type: array, items: { type: object, additionalProperties: true } }
        education: { type: array, items: { type: object, additionalProperties: true } }
        certifications: { type: array, items: { type: object, additionalProperties: true } }
        languages: { type: array, items: { type: object, additionalProperties: true } }
        projects: { type: array, items: { type: object, additionalProperties: true } }
        achievements: { type: array, items: { type: object, additionalProperties: true } }
        publications: { type: array, items: { type: object, additionalProperties: true } }
        memberships: { type: array, items: { type: object, additionalProperties: true } }
        volunteer_work: { type: array, items: { type: object, additionalProperties: true } }
        references: { type: array, items: { type: object, additionalProperties: true } }

    UserProfileUpdate:
      type: object
      properties:
        full_name: { type: string }
        email: { type: string, format: email }
        location: { type: string }
        years_experience: { type: integer, minimum: 0 }

    NotificationPreferences:
      type: object
      properties:
        whatsapp_alerts: { type: boolean, default: true }
        email_notifications_enabled: { type: boolean, default: true }
        language: { type: string, enum: [en, bem], default: en }

    NotificationPreferencesUpdate:
      type: object
      properties:
        whatsapp_alerts: { type: boolean }
        email_notifications_enabled: { type: boolean }
        language: { type: string, enum: [en, bem] }

    UserPreferences:
      type: object
      description: Dashboard settings (WhatsApp delivery, location, currency, alerts).
      properties:
        whatsapp_number:
          type: string
          nullable: true
          description: Zambian E.164 (+260 plus 9 digits). Falls back to auth phone when unset.
          pattern: '^\+260[0-9]{9}$'
        location: { type: string, nullable: true }
        currency: { type: string, enum: [ZMW, USD], default: ZMW }
        alert_frequency: { type: string, enum: [daily, weekly, muted], default: daily }
        whatsapp_verified: { type: boolean, default: false }
        preferred_notification_channel:
          type: string
          enum: [email, whatsapp, both]
          default: email
          description: Daily digest channel. WhatsApp/both require Starter+.
        whatsapp_digest_available:
          type: boolean
          default: false
          description: True when subscription tier allows WhatsApp digests.
        quiet_hours_start:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          default: '20:00'
        quiet_hours_end:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          default: '07:00'
        profile_visible_to_employers: { type: boolean, default: true }
        hidden_employer_name: { type: string, nullable: true, maxLength: 120 }
        notify_product_updates: { type: boolean, default: false }
        display_timezone: { type: string, default: Africa/Lusaka }

    UserPreferencesUpdate:
      type: object
      properties:
        whatsapp_number:
          type: string
          pattern: '^\+260[0-9]{9}$'
        location: { type: string, maxLength: 100 }
        currency: { type: string, enum: [ZMW, USD] }
        alert_frequency: { type: string, enum: [daily, weekly, muted] }
        preferred_notification_channel:
          type: string
          enum: [email, whatsapp, both]
        quiet_hours_start:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        quiet_hours_end:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        profile_visible_to_employers: { type: boolean }
        hidden_employer_name: { type: string, nullable: true, maxLength: 120 }
        notify_product_updates: { type: boolean }
        display_timezone: { type: string, maxLength: 64 }

    NotificationChannels:
      type: object
      properties:
        whatsapp: { type: boolean, default: true }
        email: { type: boolean, default: true }

    AutoMatchPreferences:
      type: object
      properties:
        auto_match_enabled: { type: boolean, default: true }
        notification_channels: { $ref: '#/components/schemas/NotificationChannels' }

    AutoMatchPreferencesUpdate:
      type: object
      properties:
        auto_match_enabled: { type: boolean }
        notification_channels: { $ref: '#/components/schemas/NotificationChannels' }

    ConsentType:
      type: string
      enum:
        - terms_of_service
        - privacy_policy
        - marketing_email
        - marketing_whatsapp
        - analytics_cookies
        - third_party_data_sharing

    ConsentUpdateBody:
      type: object
      required: [consent_type, granted]
      properties:
        consent_type: { $ref: '#/components/schemas/ConsentType' }
        granted: { type: boolean }

    ConsentRecordResponse:
      type: object
      required: [consent_type, granted, granted_at]
      properties:
        consent_type: { $ref: '#/components/schemas/ConsentType' }
        granted: { type: boolean }
        granted_at: { type: string, format: date-time }
        legal_doc_version: { type: string, nullable: true }

    ConsentUpdateResponse:
      type: object
      required: [consent]
      properties:
        consent: { $ref: '#/components/schemas/ConsentRecordResponse' }

    ConsentStatusResponse:
      type: object
      required: [consents, last_updated]
      properties:
        consents:
          type: object
          additionalProperties: { type: boolean }
        last_updated:
          type: object
          additionalProperties: { type: string, format: date-time }

    # Phase 2 Initiative #4 — job-search preferences. Backs
    # /api/v1/preferences (distinct from /profile/preferences, which is
    # notification prefs). Shape mirrors
    # apps/backend/app/schemas/preferences.py and
    # apps/frontend/src/lib/api.ts::JobPreferences.
    PreferredLanguage:
      type: object
      required: [language]
      properties:
        language: { type: string, minLength: 1, maxLength: 80 }
        proficiency:
          type: string
          enum: [native, fluent, intermediate, basic]
          default: intermediate

    IndustryExperience:
      type: object
      required: [industry]
      properties:
        industry: { type: string, minLength: 1, maxLength: 120 }
        years_experience: { type: integer, minimum: 0, maximum: 80, default: 0 }

    JobPreferences:
      type: object
      description: |
        User's job-search preferences. One row per user; auto-created on
        first GET. Salary amounts are in ZMW ngwee (1 ZMW = 100 ngwee).
      properties:
        target_roles:
          type: array
          items: { type: string }
          maxItems: 10
        target_roles_source:
          type: string
          enum: [user_provided, cv_inferred, mixed]
          default: user_provided
        salary_min:
          type: integer
          minimum: 0
          nullable: true
          description: ZMW ngwee. Null = unspecified.
        salary_max:
          type: integer
          minimum: 0
          nullable: true
          description: ZMW ngwee. Null = unspecified.
        salary_currency: { type: string, minLength: 3, maxLength: 3, default: ZMW }
        salary_frequency:
          type: string
          enum: [monthly, annual, hourly, daily]
          nullable: true
        preferred_work_arrangement:
          type: string
          enum: [remote, hybrid, onsite, any]
          nullable: true
        willing_to_relocate: { type: boolean, default: false }
        acceptable_regions:
          type: array
          items: { type: string }
          maxItems: 6
        languages:
          type: array
          items: { $ref: '#/components/schemas/PreferredLanguage' }
          maxItems: 8
        industries:
          type: array
          items: { $ref: '#/components/schemas/IndustryExperience' }
          maxItems: 8
        extras:
          type: object
          additionalProperties: true
          description: Free-form key/value bag for additional user-provided info.
        auto_populated_at: { type: string, format: date-time, nullable: true }
        manually_updated_at: { type: string, format: date-time, nullable: true }
        auto_populated_fields:
          type: array
          items: { type: string }
          description: |
            Which fields are still showing values from the CV auto-populate
            path (and haven't been manually edited since). Used by the UI
            to render the "Auto-populated from CV" badge.

    JobPreferencesUpdate:
      type: object
      description: |
        Partial-update body for PATCH /api/v1/preferences. Every field is
        optional — clients send only what changed. salary_min must be <=
        salary_max when both are present; the API returns 422 otherwise.
      properties:
        target_roles: { type: array, items: { type: string }, maxItems: 10 }
        salary_min: { type: integer, minimum: 0, nullable: true }
        salary_max: { type: integer, minimum: 0, nullable: true }
        salary_currency: { type: string, minLength: 3, maxLength: 3 }
        salary_frequency:
          type: string
          enum: [monthly, annual, hourly, daily]
          nullable: true
        preferred_work_arrangement:
          type: string
          enum: [remote, hybrid, onsite, any]
          nullable: true
        willing_to_relocate: { type: boolean }
        acceptable_regions: { type: array, items: { type: string }, maxItems: 6 }
        languages:
          type: array
          items: { $ref: '#/components/schemas/PreferredLanguage' }
          maxItems: 8
        industries:
          type: array
          items: { $ref: '#/components/schemas/IndustryExperience' }
          maxItems: 8
        extras: { type: object, additionalProperties: true }

    ProfileDeleted:
      type: object
      properties:
        deleted: { type: boolean }
        user_id: { type: string, format: uuid }

    UserSkill:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 100 }
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          default: intermediate
        source:
          type: string
          enum: [cv_parse, manual, assessment]
          default: manual

    UserSkillsList:
      type: object
      properties:
        skills:
          type: array
          items: { $ref: '#/components/schemas/UserSkill' }

    UserSkillCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          default: intermediate

    UserSkillUpdate:
      type: object
      required: [proficiency]
      properties:
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]

    AdminScraperStatsDay:
      type: object
      properties:
        date: { type: string, format: date }
        accepted_as_job: { type: integer }
        rejected_as_promo: { type: integer }
        rejected_as_other: { type: integer }

    AdminParserStats:
      type: object
      properties:
        parser: { type: string }
        attempted: { type: integer }
        found_email: { type: integer }
        found_phone: { type: integer }
        failed: { type: integer }

    AdminScraperStats:
      type: object
      properties:
        days:
          type: array
          items: { $ref: '#/components/schemas/AdminScraperStatsDay' }
        accepted_as_job: { type: integer }
        rejected_as_promo: { type: integer }
        rejected_as_other: { type: integer }
        parsers:
          type: array
          items: { $ref: '#/components/schemas/AdminParserStats' }

    AdminLlmCostByModel:
      type: object
      properties:
        model: { type: string }
        cost_usd: { type: number, format: float }
        request_count: { type: integer }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }

    AdminLlmCostByFeature:
      type: object
      properties:
        feature: { type: string }
        cost_usd: { type: number, format: float }
        request_count: { type: integer }

    AdminLlmCostDay:
      type: object
      properties:
        date: { type: string, format: date }
        cost_usd: { type: number, format: float }

    AdminLlmCostStats:
      type: object
      properties:
        days: { type: integer }
        total_cost_usd: { type: number, format: float }
        total_requests: { type: integer }
        by_model:
          type: array
          items: { $ref: '#/components/schemas/AdminLlmCostByModel' }
        by_feature:
          type: array
          items: { $ref: '#/components/schemas/AdminLlmCostByFeature' }
        daily:
          type: array
          items: { $ref: '#/components/schemas/AdminLlmCostDay' }

    AdminStats:
      type: object
      properties:
        users_total: { type: integer }
        users_active_30d: { type: integer }
        subscriptions_active: { type: integer }
        subscriptions_paid: { type: integer }
        jobs_total: { type: integer }
        jobs_active: { type: integer }
        jobs_expired: { type: integer }
        matches_24h: { type: integer }
        matches_total: { type: integer }
        revenue_ngwee_30d: { type: integer }
        revenue_ngwee_total: { type: integer }
        pending_review_count: { type: integer }
        jobs_deactivated: { type: integer }
        jobs_need_review: { type: integer }
        jobs_active_public: { type: integer }

    AdminReviewQueueOverview:
      type: object
      properties:
        need_review: { type: integer }
        deactivated: { type: integer }
        active_public: { type: integer }
        auto_dismiss_hidden_eligible: { type: integer }
        dismiss_expired_eligible: { type: integer }
        dismiss_junk_eligible: { type: integer }
        active_no_deadline_pending:
          type: integer
          description: Active jobs in review with apply path but no closing_date (human judgment bucket).

    ReviewQueueAutoDismissRequest:
      type: object
      properties:
        dry_run: { type: boolean, default: false }
        limit: { type: integer, minimum: 1, maximum: 5000, default: 2000 }

    ReviewQueueAutoDismissResponse:
      type: object
      properties:
        dry_run: { type: boolean }
        eligible: { type: integer }
        dismissed: { type: integer }

    ReviewQueueBulkDismissResponse:
      type: object
      properties:
        dry_run: { type: boolean }
        eligible: { type: integer }
        dismissed: { type: integer }
        category: { type: string }

    ReviewQueueBulkDismissAllResponse:
      type: object
      properties:
        dry_run: { type: boolean }
        hidden_eligible: { type: integer }
        hidden_dismissed: { type: integer }
        expired_eligible: { type: integer }
        expired_dismissed: { type: integer }
        junk_eligible: { type: integer }
        junk_dismissed: { type: integer }

    AdminUserRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string }
        location: { type: string }
        subscription_tier: { type: string, enum: [free, starter, professional, super_standard] }
        role: { type: string, enum: [user, superadmin] }
        matches_used: { type: integer }
        matches_limit: { type: integer }
        welcome_match_bonus: { type: integer, nullable: true }
        welcome_match_bonus_until: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    AdminWelcomeBonusUpdate:
      type: object
      properties:
        welcome_match_bonus: { type: integer, minimum: 1, maximum: 999 }
        welcome_match_bonus_until: { type: string, format: date-time }

    AdminRepairDeliveryRequest:
      type: object
      properties:
        reset_month_credits:
          type: boolean
          default: true
          description: Clear credited_at this billing month, then re-credit up to tier cap.
        apply_welcome:
          type: boolean
          default: true
          description: Free tier — set 7 welcome matches and extend window if missing/expired.

    AdminRepairDeliveryResponse:
      type: object
      required: [user_id, tier, matches_limit, credited_before, credited_after]
      properties:
        user_id: { type: string, format: uuid }
        tier: { type: string }
        matches_limit: { type: integer }
        credited_before: { type: integer }
        credited_after: { type: integer }
        credits_reset_this_month: { type: integer }
        newly_credited_job_ids:
          type: array
          items: { type: string, format: uuid }
        welcome_bonus_updated: { type: boolean }

    MatchDismissRequest:
      type: object
      properties:
        reason:
          type: string
          enum: [not_relevant, wrong_location, salary_too_low, experience_mismatch, already_applied, other]
          nullable: true
        note:
          type: string
          maxLength: 500
          nullable: true
          description: Optional detail when reason is other.

    MatchDismissResponse:
      type: object
      required: [match_id, status]
      properties:
        match_id: { type: string, format: uuid }
        status: { type: string, enum: [dismissed] }
        reason: { type: string, nullable: true }
        note: { type: string, nullable: true }

    AdminUserList:
      type: object
      properties:
        users: { type: array, items: { $ref: '#/components/schemas/AdminUserRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    AdminJobRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        company: { type: string }
        location: { type: string }
