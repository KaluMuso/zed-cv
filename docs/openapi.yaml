          description: CV parsed and stored synchronously.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CVUploadResponse' }
        '202':
          description: |
            CV accepted into cv_upload_queue when Gemini rate limits defer parse/embed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CVUploadQueuedResponse' }
        '422':
          description: Unsupported file, image-only PDF, or insufficient extractable text
          content:
            application/problem+json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      detail: { type: string }
                  - { $ref: '#/components/schemas/CVUploadProblem' }
        '503':
          description: AI busy and queue/storage fallback also failed.

