        candidate_user_id: { type: string, format: uuid }
        message_text: { type: string }
        channel: { type: string }
        sent_at: { type: string, format: date-time, nullable: true }
        candidate_responded_at: { type: string, format: date-time, nullable: true }
        candidate_consented: { type: boolean, nullable: true }
        status: { type: string, enum: [pending, consented, declined, expired, unavailable, draft] }
        candidate_phone: { type: string, nullable: true, description: Only when status=consented }
        candidate_email: { type: string, nullable: true }
        candidate_name: { type: string, nullable: true }

    ContactStatusSummary:
      type: object
      properties:
        pending: { type: integer }
        consented: { type: integer }
        declined: { type: integer }
        expired: { type: integer }
        draft: { type: integer }
        unavailable: { type: integer }
        total: { type: integer }

    EmployerContactsResponse:
      type: object
      properties:
        contacts: { type: array, items: { $ref: '#/components/schemas/ContactRequestRow' } }
        total: { type: integer }
        summary: { $ref: '#/components/schemas/ContactStatusSummary' }

    EmployerSubscriptionResponse:
      type: object
      properties:
        tier: { type: string, enum: [lite, pro], nullable: true }
        status: { type: string }
        active: { type: boolean }
        current_period_end: { type: string, format: date-time, nullable: true }
        contacts_used: { type: integer }
        contacts_limit: { type: integer }
        price_ngwee: { type: integer, description: 'K500 lite = 50000, K2500 pro = 250000' }

    EmployerCheckoutBody:
      type: object
      required: [tier]
      properties:
        tier: { type: string, enum: [lite, pro] }

    EmployerCheckoutResponse:
      type: object
      properties:
        reference: { type: string }
        amount_ngwee: { type: integer }
        tier: { type: string, enum: [lite, pro] }
        public_key: { type: string }
        label: { type: string }

    EmployerVerifyPaymentBody:
      type: object
      required: [reference, tier]
      properties:
        reference: { type: string, minLength: 8, maxLength: 128 }
        tier: { type: string, enum: [lite, pro] }

    EmployerVerifyPaymentResponse:
      type: object
      properties:
        status: { type: string }
        tier: { type: string }
        reference: { type: string }
        message: { type: string }

    Subscription:
      type: object
      description: |
        Shape of GET /subscription. Mirrors apps/backend/app/schemas/subscription.py::Subscription
        (the API response model — distinct from the wider DB row, which carries id,
        status, and current_period_*). `active` is true when status='active'.
      properties:
        tier: { type: string, enum: [free, starter, professional, super_standard] }
        matches_used: { type: integer }
        matches_limit: { type: integer }
        matches_unlimited: { type: boolean, description: 'True when matches_limit is unlimited sentinel (99999)' }
        active: { type: boolean }
        expires_at: { type: string, format: date-time, nullable: true }
        welcome_match_bonus:
          type: integer
          nullable: true
          description: Free-tier welcome quota while welcome_match_bonus_until is active.
        welcome_match_bonus_until:
          type: string
          format: date-time
          nullable: true
        promo_until:
          type: string
          format: date-time
          nullable: true
          description: First-two-months 50% paid-tier checkout discount ends at this instant.
        welcome_bonus_active:
          type: boolean
          nullable: true
          description: True when free tier and still within welcome_match_bonus_until.

    PaymentInitiate:
      type: object
      required: [tier, payment_method]
      properties:
        tier: { type: string, enum: [starter, professional, super_standard] }
        payment_method:
          type: string
          description: >
            DPO short names (mtn, airtel, card) or Lenco sub-channels
            (lenco_mtn_money, lenco_airtel_money, lenco_card). Generic lenco
            is resolved from the phone prefix on the server.
          enum:
            - mtn
            - airtel
            - card
            - mtn_money
            - airtel_money
            - card_money
            - lenco
            - lenco_mtn_money
            - lenco_airtel_money
            - lenco_card
        phone: { type: string, pattern: '^\+260[0-9]{9}$' }

    BwanaChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string, minLength: 1, maxLength: 2000 }
        session_id:
          type: string
          maxLength: 64
          description: Client session id for conversation continuity

    BwanaChatResponse:
      type: object
      required: [response, source, took_ms, session_id]
      properties:
        response: { type: string }
        source:
          type: string
          enum: [faq, llm, escalated]
        took_ms: { type: integer }
        session_id: { type: string }
        escalation_ticket_id:
          type: string
          nullable: true
          description: Present when source=escalated (e.g. ZD-A1B2C3D4)
        intent_id:
          type: string
          nullable: true
          description: FAQ intent id when source=faq

    FaqIntentItem:
      type: object
      required: [intent_id, enabled, triggers, response]
      properties:
        intent_id:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
        enabled: { type: boolean }
        triggers:
          type: array
          items: { type: string }
          minItems: 1
        response: { type: string, minLength: 5, maxLength: 1200 }

    BwanaPublicConfig:
      type: object
      required: [chatbot_display_name, support_email, support_phone, escalation_sla_hours]
      properties:
        chatbot_display_name: { type: string }
        support_email: { type: string, format: email }
        support_phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        escalation_sla_hours: { type: integer, minimum: 1, maximum: 168 }

    BwanaConfig:
      type: object
      required:
        - chatbot_display_name
        - operator_display_name
        - support_email
        - support_phone
        - escalation_whatsapp_phone
        - escalation_sla_hours
        - human_escalation_reply_template
        - unsatisfied_reply_template
        - contact_admin_reply_template
        - enable_email_escalation
        - enable_user_escalation_ack
        - user_escalation_ack_template
      properties:
        id: { type: integer }
        chatbot_display_name: { type: string }
        operator_display_name: { type: string }
        support_email: { type: string, format: email }
        support_phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        escalation_whatsapp_phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        escalation_sla_hours: { type: integer, minimum: 1, maximum: 168 }
        human_escalation_reply_template: { type: string }
        unsatisfied_reply_template: { type: string }
        contact_admin_reply_template: { type: string }
        public_knowledge_extra: { type: string, maxLength: 2000 }
        faq_intents_json:
          type: array
          items: { $ref: '#/components/schemas/FaqIntentItem' }
        enable_email_escalation: { type: boolean }
        enable_user_escalation_ack: { type: boolean }
        user_escalation_ack_template: { type: string, maxLength: 2000 }
        updated_at: { type: string, format: date-time, nullable: true }
        updated_by: { type: string, format: uuid, nullable: true }

    BwanaAnalyticsSummary:
      type: object
      required:
        - period_days
        - total_messages
        - total_escalations
        - escalation_rate_percent
        - messages_by_source
        - escalations_by_reason
        - top_faq_intents
      properties:
        period_days: { type: integer }
        total_messages: { type: integer }
        total_escalations: { type: integer }
        escalation_rate_percent: { type: number }
        messages_by_source:
          type: object
          additionalProperties: { type: integer }
        escalations_by_reason:
          type: object
          additionalProperties: { type: integer }
        top_faq_intents:
          type: array
          items:
            type: object
            required: [intent_id, count]
            properties:
              intent_id: { type: string }
              count: { type: integer }
        unique_sessions: { type: integer }
        faq_turns: { type: integer }
        llm_turns: { type: integer }
        escalated_turns: { type: integer }
        bwana_llm_cost_usd: { type: number }
        bwana_llm_requests: { type: integer }
        pipeline_mode:
          type: string
          enum: [in_process, n8n]
        n8n_fallback_events:
          type: integer
          nullable: true
          description: Not persisted yet; null until fallback events are logged
        analytics_source:
          type: string
          enum: [live, stub]

    BwanaConversationSummary:
      type: object
      required: [user_id, session_id, message_count]
      properties:
        user_id: { type: string, format: uuid }
        session_id: { type: string }
        message_count: { type: integer }
        last_activity_at: { type: string, format: date-time, nullable: true }
        preview: { type: string }

    BwanaConversationList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/BwanaConversationSummary' }
        total: { type: integer }
        q: { type: string, nullable: true }
        limit: { type: integer }
        offset: { type: integer }

    BwanaConfigPatch:
      type: object
      properties:
        chatbot_display_name: { type: string }
        operator_display_name: { type: string }
        support_email: { type: string, format: email }
        support_phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        escalation_whatsapp_phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        escalation_sla_hours: { type: integer, minimum: 1, maximum: 168 }
        human_escalation_reply_template: { type: string }
        unsatisfied_reply_template: { type: string }
        contact_admin_reply_template: { type: string }
        public_knowledge_extra: { type: string, maxLength: 2000 }
        faq_intents_json:
          type: array
          items: { $ref: '#/components/schemas/FaqIntentItem' }
        enable_email_escalation: { type: boolean }
        enable_user_escalation_ack: { type: boolean }
        user_escalation_ack_template: { type: string, maxLength: 2000 }

    BwanaConfigPreview:
      type: object
      required: [system_prompt_preview, char_count, system_prompt_version]
      properties:
        system_prompt_preview: { type: string }
        char_count: { type: integer }
        system_prompt_version:
          type: string
          description: Read-only tag (boundaries file hash + config updated_at)

    InterviewPrepRequest:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string, format: uuid }

    InterviewPrepResponse:
      type: object
      properties:
        content: { type: string, description: "Markdown brief" }
        word_count: { type: integer }
        job_title: { type: string }
        company: { type: string }
        cached: { type: boolean }
        degraded:
          type: boolean
          default: false
          description: True when the LLM circuit breaker skipped the provider call

    MockInterviewStartRequest:
      type: object
      required: [role_label]
      properties:
        role_label: { type: string, maxLength: 200 }

    MockInterviewStartResponse:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        question: { type: string }
        question_number: { type: integer }
        total_questions: { type: integer }

    MockInterviewAnswerRequest:
      type: object
      required: [session_id, answer]
      properties:
        session_id: { type: string, format: uuid }
        answer: { type: string, maxLength: 8000 }

    MockInterviewAnswerResponse:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        progress:
          type: object
          nullable: true
          properties:
            star_score: { type: number }
            feedback: { type: string }
            question_number: { type: integer }
            total_questions: { type: integer }
        next_question: { type: string, nullable: true }
        final_summary:
          type: object
          nullable: true
          properties:
            overall_score: { type: number }
            strengths: { type: array, items: { type: string } }
            improvements: { type: array, items: { type: string } }
            practice_areas: { type: array, items: { type: string } }

    AptitudePackResponse:
      type: object
      properties:
        pack: { type: string, enum: [numerical, verbal, abstract] }
        time_limit_seconds: { type: integer }
        questions:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              question_text: { type: string }
              options:
                type: array
                items:
                  type: object
                  properties:
                    label: { type: string }
                    value: { type: string }

    AptitudeScoreRequest:
      type: object
      required: [pack, answers, elapsed_seconds]
      properties:
        pack: { type: string, enum: [numerical, verbal, abstract] }
        answers:
          type: array
          minItems: 20
          maxItems: 20
          items:
            type: object
            required: [question_id, value]
            properties:
              question_id: { type: string, format: uuid }
              value: { type: string }
        elapsed_seconds: { type: integer, minimum: 0, maximum: 7200 }

    AptitudeScoreResponse:
      type: object
      properties:
        pack: { type: string }
        score: { type: number }
        percentile: { type: number }
        correct_count: { type: integer }
        total_questions: { type: integer }

    InterviewHistoryResponse:
      type: object
      properties:
        mock_sessions:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              role_label: { type: string }
              overall_score: { type: number, nullable: true }
              created_at: { type: string, format: date-time, nullable: true }
        aptitude_scores:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              pack: { type: string }
              score: { type: number }
              percentile: { type: number, nullable: true }
              elapsed_seconds: { type: integer, nullable: true }
              completed_at: { type: string, format: date-time, nullable: true }

    PaymentInitiateResponse:
      type: object
      properties:
        message: { type: string }
        transaction_id: { type: string }

    PaymentVerifyRequest:
      type: object
      required: [reference, tier]
      properties:
        reference:
          type: string
          description: Lenco widget reference (e.g. zedapply-uuid)
        tier:
          type: string
          enum: [starter, professional, super_standard]

    PaymentVerifyResponse:
      type: object
      properties:
        status: { type: string, enum: [completed, processing, failed] }
        tier: { type: string }
        reference: { type: string }
        payment_id: { type: string, format: uuid, nullable: true }
        message: { type: string }

    PaymentHistoryRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: integer, description: Amount in ngwee }
        currency: { type: string, default: ZMW }
        payment_method: { type: string }
        provider: { type: string, nullable: true }
        status: { type: string, enum: [pending, completed, failed, refunded] }
        created_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }

    PaymentHistoryList:
      type: object
      properties:
        payments:
          type: array
          items: { $ref: '#/components/schemas/PaymentHistoryRow' }
        total: { type: integer }

    InvoiceDetail:
      type: object
      properties:
        invoice_number: { type: string }
        payment_id: { type: string, format: uuid }
        reference: { type: string }
        status: { type: string }
        amount_ngwee: { type: integer }
        amount_kwacha: { type: integer }
        currency: { type: string, default: ZMW }
        tier: { type: string }
        tier_label: { type: string }
        payment_method: { type: string }
        provider: { type: string, nullable: true }
        issued_at: { type: string, format: date-time, nullable: true }
        customer_name: { type: string }
        customer_email: { type: string, nullable: true }
        customer_phone: { type: string, nullable: true }

    SubscriptionCancelResponse:
      type: object
      properties:
        status: { type: string, enum: [cancelled, already_cancelled] }
        message: { type: string }
        tier: { type: string }
        active_until: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time }

    CoverLetterRequest:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string, format: uuid }
        tone: { type: string, enum: [formal, friendly, confident], default: formal }

    CoverLetterResponse:
      type: object
      properties:
        content: { type: string }
        word_count: { type: integer }

    JobCoverLetterResponse:
      type: object
      required: [content, word_count, document_id]
      properties:
        content: { type: string, description: Generated cover letter text }
        word_count: { type: integer, minimum: 1 }
        document_id: { type: string, format: uuid, description: Saved generated_documents row id }

    HealthCheck:
      type: object
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        version: { type: string }
        supabase: { type: boolean }
        waha: { type: boolean }
        redis_configured:
          type: boolean
          description: True when REDIS_URL is set (shared rate-limit storage).
        redis:
          type: boolean
          description: True when REDIS_URL is set and a PING succeeds. Omitted when REDIS_URL is unset.
        vapid_configured:
          type: boolean
          description: True when VAPID keys are set for web push.
        resend_configured:
          type: boolean
          description: True when RESEND_API_KEY is set (email OTP/digests).
        sentry_configured:
          type: boolean
          description: True when SENTRY_DSN is set (error tracking active).
        gemini_direct_configured:
          type: boolean
          description: True when GEMINI_API_KEY is set (batch LLM + embeddings).
        openrouter_configured:
          type: boolean
          description: True when OPENROUTER_API_KEY is set (user-facing LLM + fallback).
        llm_provider_batch:
          type: string
          enum: [gemini_direct, openrouter]
          description: Primary provider for batch/cron LLM (deep_enrich, ingest enrichment).
        last_gemini_call_status:
          type: string
          description: Last known outcome for gemini_direct calls (ok, error, quota_exhausted, unknown).
        last_openrouter_call_status:
          type: string
          description: Last known outcome for OpenRouter calls (ok, error, unknown).

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthCheck' }

  /contact:
    post:
      operationId: submitContact
      summary: Relay contact-form message to operator inbox
      tags: [Contact]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactSubmission' }
      responses:
        '200':
          description: Message relayed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactResult' }
        '422': { description: Validation error }
        '429': { description: Rate limited (2 submissions per hour per IP) }
        '503': { description: Email relay unavailable }

  /auth/login:
    post:
      operationId: loginWithTrustedDevice
      summary: Login with trusted device (skip OTP when X-Device-Token is valid)
      tags: [Auth]
      parameters:
        - name: X-Device-Token
          in: header
          required: false
          schema: { type: string }
          description: Raw device trust token from localStorage (zedapply_device_token)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Trusted device accepted; JWT issued without OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { description: OTP required (unknown user or untrusted device) }

  /auth/refresh:
    post:
      operationId: refreshAccessToken
      summary: Exchange a valid refresh_token for a fresh access + refresh pair
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { description: Invalid or expired refresh token }
        '429': { description: Rate limited (30 per minute) }

  /auth/otp/request:
    post:
      operationId: requestOTP
      summary: Request OTP via email or WhatsApp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OTPRequest' }
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OTPRequestResponse' }
        '429': { description: Rate limited }
        '503':
          description: Delivery channel unavailable (RFC 7807 problem+json)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /auth/otp/verify:
    post:
      operationId: verifyOTP
      summary: Verify OTP and get tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OTPVerify' }
      responses:
        '200':
          description: Auth successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { description: Invalid OTP }

  /profile:
    get:
      operationId: getProfile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    patch:
      operationId: updateProfile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProfileUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    delete:
      operationId: deleteProfile
      summary: Hard-delete the caller's account and cascade-related rows
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDeleted' }

  /profile/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
    patch:
      operationId: updateNotificationPreferences
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationPreferencesUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }

  /me/export:
    get:
      operationId: exportMyData
      summary: Download full personal data bundle (JSON attachment)
      tags: [DataRights]
      security: [{ bearerAuth: [] }]
      description: |
        Zambia Data Protection Act 2021 / GDPR-aligned right of access. Streams a
        JSON attachment (`Content-Disposition: attachment`) with profile, CVs (no
        embedding vector), matches (with job snapshots), subscriptions, and payments.
        Rate-limited to 1 request per hour per authenticated user.
      responses:
        '200':
          description: JSON attachment with application/json body and Cache-Control no-store.
          headers:
            Content-Disposition:
              schema: { type: string }
              description: attachment; filename="zedcv-data-export-YYYY-MM-DD.json"
            X-Export-Format-Version:
              schema: { type: string, example: "1.0" }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataExportBundle' }
        '404': { description: User not found }
        '429': { description: Rate limited (1 export per hour per user) }

  /me:
    delete:
      operationId: deleteMyAccount
      summary: Hard-delete account after phone confirmation
      tags: [DataRights]
      security: [{ bearerAuth: [] }]
      description: |
        Irreversible erasure after `confirm_phone` matches the stored phone byte-for-byte.
        Idempotent: returns `already_deleted=true` when the user row is already gone.
        Purges CV storage and OTP rows; subscriptions/payments are anonymised per migration 018.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountDeletionRequest' }
