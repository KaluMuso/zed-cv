openapi: 3.1.0
info:
  title: Zed CV API
  description: AI-powered job matching platform for Zambia
  version: 0.1.0
  contact:
    email: convergeozambia@gmail.com
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.zedcv.com/api/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminApiKey:
      type: apiKey
      in: header
      name: X-ADMIN-API-KEY
      description: >
        Admin or ingest service key (ADMIN_API_KEY, X-ADMIN-API-KEY, INGEST_API_KEY,
        or X-INGEST-API-KEY). Alternative to superadmin Bearer JWT.

  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail:
          type: string
          description: Machine-readable error code (e.g. email_provider_unavailable) or human detail.
        user_message:
          type: string
          description: Safe user-facing message when detail is a machine code.
        instance: { type: string }
        request_id: { type: string }

    AdminEmailHealth:
      type: object
      required: [status, message, api_key_configured, from_email]
      properties:
        status: { type: string, enum: [ok, degraded, error] }
        code: { type: string, nullable: true }
        message: { type: string }
        api_key_configured: { type: boolean }
        from_email: { type: string }
        from_domain: { type: string, nullable: true }
        domain_verified: { type: boolean, nullable: true }
        domains_listed: { type: integer, nullable: true }

    OTPRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$', example: "+260971234567" }
        channel:
          type: string
          enum: [email, whatsapp, both]
          description: Override OTP delivery channel for this request.

    OTPVerify:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        code: { type: string, minLength: 6, maxLength: 6 }
        email:
          type: string
          format: email
          description: Required when creating a new account; stored for match digests.
        consent_accepted:
          type: boolean
          description: Required true when creating a new account.
        remember_device:
          type: boolean
          default: false
          description: When true, returns device_token to store for trusted-device login.
        referral_ref:
          type: string
          maxLength: 64
          description: Invite ref from shared link (?ref=) — referrer user id or referral_code.

    LoginRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$', example: "+260971234567" }

    OTPRequestResponse:
      type: object
      properties:
        message: { type: string }
        tier: { type: string, nullable: true }
        default_channel: { type: string, enum: [email, whatsapp, both], nullable: true }

    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user_id: { type: string, format: uuid }
        device_token:
          type: string
          nullable: true
          description: Issued when remember_device was true on OTP verify.
        trusted_device_login:
          type: boolean
          default: false
          description: True when /auth/login skipped OTP via trusted device.

    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string }
        email: { type: string, format: email }
        location: { type: string }
        years_experience: { type: integer, minimum: 0 }
        skills: { type: array, items: { type: string } }
        cv_uploaded: { type: boolean }
        subscription_tier: { type: string, enum: [free, starter, professional, super_standard] }
        role: { type: string, enum: [user, superadmin] }
        created_at: { type: string, format: date-time }
        cv_sections:
          oneOf:
            - { $ref: '#/components/schemas/CVSections' }
            - { type: 'null' }
          description: |
            Structured CV body extracted by the parser (task #59). Null for
            users who haven't uploaded a CV or whose upload pre-dates the
            structured-parser change. Canon shape is app/schemas/cv_sections.py.
        referral_code:
          type: string
          description: Stable invite code for sharing with friends.
        referral_signups_count:
          type: integer
          minimum: 0
          description: Users who signed up via this user's invite link.
        referral_qualified_count:
          type: integer
          minimum: 0
          description: Referred users who uploaded a CV and triggered referral rewards.

    CVSections:
      type: object
      description: |
        Structured CV body. All sections optional; missing sections render
        as empty. Field-level shape lives in app/schemas/cv_sections.py;
        this schema documents the top-level keys only.
      properties:
        header:
          type: object
          nullable: true
          properties:
            linkedin_url: { type: string, format: uri, nullable: true }
            portfolio_url: { type: string, format: uri, nullable: true }
            github_url: { type: string, format: uri, nullable: true }
        professional_summary:
          type: object
          nullable: true
          properties:
            text: { type: string, maxLength: 1000 }
        work_experience: { type: array, items: { type: object, additionalProperties: true } }
        education: { type: array, items: { type: object, additionalProperties: true } }
        certifications: { type: array, items: { type: object, additionalProperties: true } }
        languages: { type: array, items: { type: object, additionalProperties: true } }
        projects: { type: array, items: { type: object, additionalProperties: true } }
        achievements: { type: array, items: { type: object, additionalProperties: true } }
        publications: { type: array, items: { type: object, additionalProperties: true } }
        memberships: { type: array, items: { type: object, additionalProperties: true } }
        volunteer_work: { type: array, items: { type: object, additionalProperties: true } }
        references: { type: array, items: { type: object, additionalProperties: true } }

    UserProfileUpdate:
      type: object
      properties:
        full_name: { type: string }
        email: { type: string, format: email }
        location: { type: string }
        years_experience: { type: integer, minimum: 0 }

    NotificationPreferences:
      type: object
      properties:
        whatsapp_alerts: { type: boolean, default: true }
        email_notifications_enabled: { type: boolean, default: true }
        language: { type: string, enum: [en, bem], default: en }

    NotificationPreferencesUpdate:
      type: object
      properties:
        whatsapp_alerts: { type: boolean }
        email_notifications_enabled: { type: boolean }
        language: { type: string, enum: [en, bem] }

    UserPreferences:
      type: object
      description: Dashboard settings (WhatsApp delivery, location, currency, alerts).
      properties:
        whatsapp_number:
          type: string
          nullable: true
          description: Zambian E.164 (+260 plus 9 digits). Falls back to auth phone when unset.
          pattern: '^\+260[0-9]{9}$'
        location: { type: string, nullable: true }
        currency: { type: string, enum: [ZMW, USD], default: ZMW }
        alert_frequency: { type: string, enum: [daily, weekly, muted], default: daily }
        whatsapp_verified: { type: boolean, default: false }
        preferred_notification_channel:
          type: string
          enum: [email, whatsapp, both]
          default: email
          description: Daily digest channel. WhatsApp/both require Starter+.
        whatsapp_digest_available:
          type: boolean
          default: false
          description: True when subscription tier allows WhatsApp digests.
        quiet_hours_start:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          default: '20:00'
        quiet_hours_end:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          default: '07:00'
        profile_visible_to_employers: { type: boolean, default: true }
        hidden_employer_name: { type: string, nullable: true, maxLength: 120 }
        notify_product_updates: { type: boolean, default: false }
        display_timezone: { type: string, default: Africa/Lusaka }

    UserPreferencesUpdate:
      type: object
      properties:
        whatsapp_number:
          type: string
          pattern: '^\+260[0-9]{9}$'
        location: { type: string, maxLength: 100 }
        currency: { type: string, enum: [ZMW, USD] }
        alert_frequency: { type: string, enum: [daily, weekly, muted] }
        preferred_notification_channel:
          type: string
          enum: [email, whatsapp, both]
        quiet_hours_start:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        quiet_hours_end:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        profile_visible_to_employers: { type: boolean }
        hidden_employer_name: { type: string, nullable: true, maxLength: 120 }
        notify_product_updates: { type: boolean }
        display_timezone: { type: string, maxLength: 64 }

    NotificationChannels:
      type: object
      properties:
        whatsapp: { type: boolean, default: true }
        email: { type: boolean, default: true }

    AutoMatchPreferences:
      type: object
      properties:
        auto_match_enabled: { type: boolean, default: true }
        notification_channels: { $ref: '#/components/schemas/NotificationChannels' }

    AutoMatchPreferencesUpdate:
      type: object
      properties:
        auto_match_enabled: { type: boolean }
        notification_channels: { $ref: '#/components/schemas/NotificationChannels' }

    # Phase 2 Initiative #4 — job-search preferences. Backs
    # /api/v1/preferences (distinct from /profile/preferences, which is
    # notification prefs). Shape mirrors
    # apps/backend/app/schemas/preferences.py and
    # apps/frontend/src/lib/api.ts::JobPreferences.
    PreferredLanguage:
      type: object
      required: [language]
      properties:
        language: { type: string, minLength: 1, maxLength: 80 }
        proficiency:
          type: string
          enum: [native, fluent, intermediate, basic]
          default: intermediate

    IndustryExperience:
      type: object
      required: [industry]
      properties:
        industry: { type: string, minLength: 1, maxLength: 120 }
        years_experience: { type: integer, minimum: 0, maximum: 80, default: 0 }

    JobPreferences:
      type: object
      description: |
        User's job-search preferences. One row per user; auto-created on
        first GET. Salary amounts are in ZMW ngwee (1 ZMW = 100 ngwee).
      properties:
        target_roles:
          type: array
          items: { type: string }
          maxItems: 10
        target_roles_source:
          type: string
          enum: [user_provided, cv_inferred, mixed]
          default: user_provided
        salary_min:
          type: integer
          minimum: 0
          nullable: true
          description: ZMW ngwee. Null = unspecified.
        salary_max:
          type: integer
          minimum: 0
          nullable: true
          description: ZMW ngwee. Null = unspecified.
        salary_currency: { type: string, minLength: 3, maxLength: 3, default: ZMW }
        salary_frequency:
          type: string
          enum: [monthly, annual, hourly, daily]
          nullable: true
        preferred_work_arrangement:
          type: string
          enum: [remote, hybrid, onsite, any]
          nullable: true
        willing_to_relocate: { type: boolean, default: false }
        acceptable_regions:
          type: array
          items: { type: string }
          maxItems: 6
        languages:
          type: array
          items: { $ref: '#/components/schemas/PreferredLanguage' }
          maxItems: 8
        industries:
          type: array
          items: { $ref: '#/components/schemas/IndustryExperience' }
          maxItems: 8
        extras:
          type: object
          additionalProperties: true
          description: Free-form key/value bag for additional user-provided info.
        auto_populated_at: { type: string, format: date-time, nullable: true }
        manually_updated_at: { type: string, format: date-time, nullable: true }
        auto_populated_fields:
          type: array
          items: { type: string }
          description: |
            Which fields are still showing values from the CV auto-populate
            path (and haven't been manually edited since). Used by the UI
            to render the "Auto-populated from CV" badge.

    JobPreferencesUpdate:
      type: object
      description: |
        Partial-update body for PATCH /api/v1/preferences. Every field is
        optional — clients send only what changed. salary_min must be <=
        salary_max when both are present; the API returns 422 otherwise.
      properties:
        target_roles: { type: array, items: { type: string }, maxItems: 10 }
        salary_min: { type: integer, minimum: 0, nullable: true }
        salary_max: { type: integer, minimum: 0, nullable: true }
        salary_currency: { type: string, minLength: 3, maxLength: 3 }
        salary_frequency:
          type: string
          enum: [monthly, annual, hourly, daily]
          nullable: true
        preferred_work_arrangement:
          type: string
          enum: [remote, hybrid, onsite, any]
          nullable: true
        willing_to_relocate: { type: boolean }
        acceptable_regions: { type: array, items: { type: string }, maxItems: 6 }
        languages:
          type: array
          items: { $ref: '#/components/schemas/PreferredLanguage' }
          maxItems: 8
        industries:
          type: array
          items: { $ref: '#/components/schemas/IndustryExperience' }
          maxItems: 8
        extras: { type: object, additionalProperties: true }

    ProfileDeleted:
      type: object
      properties:
        deleted: { type: boolean }
        user_id: { type: string, format: uuid }

    UserSkill:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 100 }
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          default: intermediate
        source:
          type: string
          enum: [cv_parse, manual, assessment]
          default: manual

    UserSkillsList:
      type: object
      properties:
        skills:
          type: array
          items: { $ref: '#/components/schemas/UserSkill' }

    UserSkillCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          default: intermediate

    UserSkillUpdate:
      type: object
      required: [proficiency]
      properties:
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]

    AdminScraperStatsDay:
      type: object
      properties:
        date: { type: string, format: date }
        accepted_as_job: { type: integer }
        rejected_as_promo: { type: integer }
        rejected_as_other: { type: integer }

    AdminParserStats:
      type: object
      properties:
        parser: { type: string }
        attempted: { type: integer }
        found_email: { type: integer }
        found_phone: { type: integer }
        failed: { type: integer }

    AdminScraperStats:
      type: object
      properties:
        days:
          type: array
          items: { $ref: '#/components/schemas/AdminScraperStatsDay' }
        accepted_as_job: { type: integer }
        rejected_as_promo: { type: integer }
        rejected_as_other: { type: integer }
        parsers:
          type: array
          items: { $ref: '#/components/schemas/AdminParserStats' }

    AdminLlmCostByModel:
      type: object
      properties:
        model: { type: string }
        cost_usd: { type: number, format: float }
        request_count: { type: integer }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }

    AdminLlmCostByFeature:
      type: object
      properties:
        feature: { type: string }
        cost_usd: { type: number, format: float }
        request_count: { type: integer }

    AdminLlmCostDay:
      type: object
      properties:
        date: { type: string, format: date }
        cost_usd: { type: number, format: float }

    AdminLlmCostStats:
      type: object
      properties:
        days: { type: integer }
        total_cost_usd: { type: number, format: float }
        total_requests: { type: integer }
        by_model:
          type: array
          items: { $ref: '#/components/schemas/AdminLlmCostByModel' }
        by_feature:
          type: array
          items: { $ref: '#/components/schemas/AdminLlmCostByFeature' }
        daily:
          type: array
          items: { $ref: '#/components/schemas/AdminLlmCostDay' }

    AdminStats:
      type: object
      properties:
        users_total: { type: integer }
        users_active_30d: { type: integer }
        subscriptions_active: { type: integer }
        subscriptions_paid: { type: integer }
        jobs_total: { type: integer }
        jobs_active: { type: integer }
        jobs_expired: { type: integer }
        matches_24h: { type: integer }
        matches_total: { type: integer }
        revenue_ngwee_30d: { type: integer }
        revenue_ngwee_total: { type: integer }
        pending_review_count: { type: integer }

    AdminUserRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string }
        location: { type: string }
        subscription_tier: { type: string, enum: [free, starter, professional, super_standard] }
        role: { type: string, enum: [user, superadmin] }
        matches_used: { type: integer }
        matches_limit: { type: integer }
        welcome_match_bonus: { type: integer, nullable: true }
        welcome_match_bonus_until: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    AdminWelcomeBonusUpdate:
      type: object
      properties:
        welcome_match_bonus: { type: integer, minimum: 1, maximum: 999 }
        welcome_match_bonus_until: { type: string, format: date-time }

    AdminUserList:
      type: object
      properties:
        users: { type: array, items: { $ref: '#/components/schemas/AdminUserRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    AdminJobRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        company: { type: string }
        location: { type: string }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        quality_score: { type: integer }
        is_active: { type: boolean }
        closing_date: { type: string, format: date }
        posted_at: { type: string, format: date-time }

    AdminJobList:
      type: object
      properties:
        jobs: { type: array, items: { $ref: '#/components/schemas/AdminJobRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    AdminJobReviewRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        company: { type: string, nullable: true }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        source_url: { type: string, nullable: true }
        reasons: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time, nullable: true }

    AdminJobReviewQueue:
      type: object
      properties:
        jobs: { type: array, items: { $ref: '#/components/schemas/AdminJobReviewRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    AdminJobReviewUpdate:
      type: object
      properties:
        apply_url: { type: string, nullable: true }
        apply_email: { type: string, nullable: true }
        closing_date: { type: string, format: date, nullable: true }
        application_instructions: { type: string, nullable: true, maxLength: 2000 }

    ReviewJobsBulkRequest:
      type: object
      required: [job_ids]
      properties:
        job_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
          maxItems: 100

    BulkDeactivateRequest:
      type: object
      properties:
        job_ids: { type: array, items: { type: string, format: uuid }, maxItems: 500 }
        expired_only: { type: boolean, default: false }

    BulkDeactivateResponse:
      type: object
      properties:
        deactivated: { type: integer }

    AdminPaymentRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        user_phone: { type: string }
        amount: { type: integer, description: "ngwee" }
        currency: { type: string }
        payment_method: { type: string }
        provider: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }

    AdminPaymentList:
      type: object
      properties:
        payments: { type: array, items: { $ref: '#/components/schemas/AdminPaymentRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }
        total_completed_ngwee: { type: integer }

    CVUploadResponse:
      type: object
      properties:
        cv_id: { type: string, format: uuid }
        parsed_skills: { type: array, items: { type: string } }
        experience_summary: { type: string }
        parsing_confidence: { type: number, minimum: 0, maximum: 1 }

    CVAnalysisResponse:
      type: object
      properties:
        overall: { type: integer, minimum: 0, maximum: 100 }
        skills: { type: integer, minimum: 0, maximum: 100 }
        format: { type: integer, minimum: 0, maximum: 100 }
        impact: { type: integer, minimum: 0, maximum: 100 }
        strengths: { type: array, items: { type: string } }
        improvements: { type: array, items: { type: string } }
        cached: { type: boolean }

    CVGenerateRequest:
      type: object
      description: Provide either job_id (lookup target from jobs table) OR job_title (free-form).
      properties:
        job_id: { type: string, format: uuid }
        job_title: { type: string, maxLength: 500 }
        company: { type: string, maxLength: 255 }
        job_description: { type: string, maxLength: 10000 }

    CVGenerateResponse:
      type: object
      properties:
        cv_generation_id: { type: string, format: uuid }
        content: { type: string }
        word_count: { type: integer }
        job_title: { type: string }
        company: { type: string }
        sections:
          oneOf:
            - { $ref: '#/components/schemas/CVSections' }
            - { type: 'null' }
          description: |
            Structured tailored CV (task #59). Templates consume this
            directly instead of re-parsing `content`. Null on legacy
            generations created before structured generation shipped.

    CVGenerationSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        job_title: { type: string }
        company: { type: string }
        word_count: { type: integer }
        created_at: { type: string, format: date-time }

    CVGenerationsList:
      type: object
      properties:
        generations:
          type: array
          items: { $ref: '#/components/schemas/CVGenerationSummary' }

    CVGenerationDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        job_title: { type: string }
        company: { type: string }
        content: { type: string }
        word_count: { type: integer }
        created_at: { type: string, format: date-time }
        sections:
          oneOf:
            - { $ref: '#/components/schemas/CVSections' }
            - { type: 'null' }
          description: |
            Structured CV body re-loaded from cv_generations.metadata. Null
            on pre-task-#59 rows; frontend falls back to parsing `content`
            in that case.

    AdminMatchRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        user_phone: { type: string }
        job_id: { type: string, format: uuid }
        job_title: { type: string }
        job_company: { type: string }
        score: { type: number }
        status: { type: string }
        created_at: { type: string, format: date-time }

    AdminMatchList:
      type: object
      properties:
        matches: { type: array, items: { $ref: '#/components/schemas/AdminMatchRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    AdminTierBreakdown:
      type: object
      properties:
        free: { type: integer }
        starter: { type: integer }
        professional: { type: integer }
        super_standard: { type: integer }
        total_active: { type: integer }

    AdminSubscriptionRow:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        user_phone: { type: string }
        full_name: { type: string }
        tier: { type: string, enum: [free, starter, professional, super_standard] }
        status: { type: string, enum: [active, expired, cancelled, past_due] }
        matches_used: { type: integer }
        matches_limit: { type: integer }
