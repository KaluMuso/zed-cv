# Allow-list for the OpenAPI <-> api.ts guard.
#
# `ignore:` silences individual (interface, field) drift entries. Each
# entry should carry a `reason` so future readers know why the field
# exists in TS without an OpenAPI counterpart (usually: it lives on a
# different status code than the schema currently documents).
#
# `unmapped_ok:` is for apiFetch<Name>() generic types that we don't
# expect to match an OpenAPI schema at all (primitive responses,
# anonymous shapes). Listing here turns off the warn-only message;
# adding `// @openapi SchemaName` to the interface is preferred.

ignore: []

unmapped_ok:
  # The endpoints below currently return an ad-hoc shape that isn't
  # documented in openapi.yaml. They're tracked for a follow-up that
  # adds proper schemas; until then the guard treats them as warn-only
  # so master HEAD stays green.
  - OTPResponse           # /auth/otp/request — {message: string}
  - ContactResult         # /contact          — task #65, not yet in spec
  - AdminLegalDoc         # /admin/legal/*    — task #62, not yet in spec

